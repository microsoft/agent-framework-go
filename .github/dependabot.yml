version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    groups:
      opentelemetry:
        patterns:
          - go.opentelemetry.io/*
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    # *.lock.yml action pins are managed by `gh aw compile`; let them advance via
    # compiler upgrades, not Dependabot (see the verify-aw-locks gate).
    exclude-paths:
      - ".github/workflows/*.lock.yml" # gh aw managed workflows
    groups:
      codeql-action:
        patterns:
          - "github/codeql-action/*"
