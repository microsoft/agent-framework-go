version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    groups:
      opentelemetry:
        patterns:
          - go.opentelemetry.io/*
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    # The *.lock.yml workflows are generated by `gh aw compile`, which pins the
    # actions it injects in lockstep with the gh-aw compiler version. Dependabot
    # bumping those pins desyncs a lock from the compiler that produced it (which
    # breaks the workflow or trips the verify-aw-locks gate). Exclude the compiler-
    # managed locks from scanning so their pins advance via gh-aw compiler upgrades
    # instead of Dependabot. Hand-authored workflows are still updated normally.
    exclude-paths:
      - ".github/workflows/*.lock.yml" # gh aw managed workflows
    groups:
      codeql-action:
        patterns:
          - "github/codeql-action/*"
